<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="max-age=86400, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>Randomizer Randomizer</title>
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="soh.tools">
    <meta property="og:title" content="Settings Randomizer - soh.tools">
    <meta property="og:description" content="Generate and download a randomized Ship of Harkinian randomizer config.">
    <meta property="og:url" content="https://soh.tools/settings/">
    <meta name="theme-color" content="#673AB7">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.14.1/themes/base/jquery-ui.css">
    <link rel="stylesheet" href="../css/site.css?v=<!-- VERSION -->">
    <link rel="stylesheet" href="./css/rando.css?v=<!-- VERSION -->">
</head>
<body>
    <script src="../scripts/site-header.js?v=<!-- VERSION -->"></script>
    <h1>Randomizer Randomizer</h1>
    <strong>Randomized: Randomize the value</strong>
    <strong>Enabled: When *not* randomized, decide if this is always on or off</strong>
    <div style="margin: 16px 0px 16px 0px;">
        <button id="generate" style="height: 50px; width: 500px;">Generate Randomizer Config</button>
    </div>
    <div>
        Extra Modes*: <input type="checkbox" id="ExtraModes" /><label for="ExtraModes">
            *Extra modes include: Mirrored World, Enemy Randomizer, Randomized Enemy Sizes, Shadow Tag, Additional Traps
        </label>
    </div>
    <div class="preset-bar">
        <div class="preset-group">
            <label for="presetSelect">Preset:</label>
            <select id="presetSelect"></select>
            <button id="presetLoad" type="button">Load</button>
            <button id="presetDelete" type="button">Delete</button>
        </div>
        <div class="preset-group">
            <input type="text" id="presetName" placeholder="New preset name…" autocomplete="off">
            <button id="presetSave" type="button">Save</button>
        </div>
        <div class="preset-group">
            <button id="presetReset" type="button">Reset to defaults</button>
        </div>
    </div>
    <div class="preset-io">
        <input type="text" id="presetString" placeholder="Paste a preset string to import, or click Export to fill this">
        <button id="presetExport" type="button">Export</button>
        <button id="presetImport" type="button">Import</button>
    </div>
    <div style="border-top: 1px solid gray; margin-bottom: 16px"></div>
    <input type="search" id="settingsSearch" placeholder="Filter settings…" autocomplete="off">
    <div id="RandomContainer"></div>
    <script src="./scripts/getConfig.js"></script>
    <script src="./scripts/getExtraModes.js"></script>
    <script src="./scripts/settingsrando.js"></script>
    <script type="text/javascript">
        initSettingsRandomizer();
    </script>
</body>
</html>
